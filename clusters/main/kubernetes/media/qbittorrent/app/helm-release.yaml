apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=oci://oci.trueforge.org/truecharts
      chart: qbittorrent
      version: 24.5.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    portal:
      open:
        enabled: false
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
            middlewares:
              - name: local
                namespace: traefik
                expandObjectName: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
        hosts:
          - host: torrent.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
    persistence:
      config:
        enabled: true
        type: nfs
        path: /mnt/tank/apps/qbittorrent
        server: ${NFS_HOST}
      media:
        enabled: true
        type: nfs
        path: /mnt/tank/media
        mountPath: /media
        server: ${NFS_HOST}
    addons:
      gluetun:
        enabled: true
        container:
          env:
            FIREWALL: "on"
            FIREWALL_OUTBOUND_SUBNETS: "192.168.178.0/24"
            VPN_SERVICE_PROVIDER: "${VPN_SERVICE_PROVIDER}"
            VPN_TYPE: "wireguard"
            WIREGUARD_PRIVATE_KEY: "${WIREGUARD_PRIVATE_KEY}"
            SERVER_COUNTRIES: "${SERVER_COUNTRIES}"
            PORT_FORWARD_ONLY: "on"
            VPN_PORT_FORWARDING: "on"
            VPN_PORT_FORWARDING_UP_COMMAND: /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:10095/api/v2/app/setPreferences'
            VPN_PORT_FORWARDING_DOWN_COMMAND: /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:10095/api/v2/app/setPreferences'
